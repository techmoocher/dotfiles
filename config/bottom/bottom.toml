# Only on Linux
#thread_text = {color = "green"}

###### LAYOUT ######
# Available widgets: "cpu", "memory", "network", "processes", "temperature", "disk", "battery", "empty"
[[row]]
  ratio = 30
  [[row.child]]
    ratio = 80
    type  = "cpu"
  [[row.child]]
    ratio = 20
    type  = "battery"
[[row]]
  ratio = 40
  [[row.child]]
    ratio = 60
    type  = "memory"
  [[row.child]]
    ratio = 40
    type  = "network"
[[row]]
  ratio = 30
    [[row.child]]
      ratio = 60
      type  = "processes"
    [[row.child]]
      ratio = 40
      type  = "temperature"
